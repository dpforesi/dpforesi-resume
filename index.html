<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dpforesi — terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─────────────────────────────────────── */
    :root {
      --bg:      #0e0800;
      --fg:      #f47003;
      --bright:  #f47003;
      --dim:     #f47003;
      --accent:  #f47003;
      --rule:    #f47003;
      --glow:    rgba(244,112,3,0.1);
    }

    /* ─── RESET ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    /* ─── CRT SCANLINES ──────────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 1px,
        rgba(0,0,0,0.3) 1px,
        rgba(0,0,0,0.3) 2px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ─── CRT FLICKER + GLOW ─────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(244,112,3,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 998;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0%   { opacity: 0.97; }
      50%  { opacity: 1; }
      100% { opacity: 0.98; }
    }

    /* ─── TRAVELING SCANLINE ─────────────────────────── */
    .crt-scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 997;
      overflow: hidden;
    }

    .crt-scanline::before {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(244,112,3,0.04) 20%,
        rgba(244,112,3,0.07) 50%,
        rgba(244,112,3,0.04) 80%,
        transparent 100%
      );
      animation: scanDown 8s linear infinite;
    }

    @keyframes scanDown {
      0%   { top: -4px; }
      100% { top: 100%; }
    }

    /* ─── TERMINAL CONTAINER ─────────────────────────── */
    .terminal {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      text-shadow: 0 0 6px rgba(244,112,3,0.6), 0 0 20px rgba(244,112,3,0.25), 0 0 40px rgba(244,112,3,0.1);
    }

    #main-content {
      flex: 1;
      flex-direction: column;
      min-height: 0;
    }

    .terminal-header {
      flex-shrink: 0;
      padding-top: 1.5rem;
    }

    /* ─── LOGO ───────────────────────────────────────── */
    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--bright);
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }

    .logo .scan-line {
      display: block;
      opacity: 0;
      transition: none;
    }

    .logo .scan-line.revealed {
      opacity: 1;
    }

    .logo-sub {
      color: var(--dim);
      font-size: 11px;
      margin-bottom: 1.5rem;
    }

    .separator {
      color: var(--dim);
      margin: 1rem 0;
    }

    /* ─── OUTPUT AREA ────────────────────────────────── */
    #output {
      white-space: pre-wrap;
      word-wrap: break-word;
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
      scrollbar-width: thin;
      scrollbar-color: var(--fg) transparent;
    }

    #output::-webkit-scrollbar {
      width: 4px;
    }

    #output::-webkit-scrollbar-track {
      background: transparent;
    }

    #output::-webkit-scrollbar-thumb {
      background: var(--fg);
      border-radius: 0;
    }

    #output .system { color: var(--dim); }
    #output .info { color: var(--fg); }
    #output .bright { color: var(--bright); }
    #output .heading {
      color: var(--bright);
      font-weight: bold;
    }
    #output .menu-item {
      color: var(--fg);
      cursor: text;
      display: inline;
    }
    #output .menu-item:hover {
      color: var(--bright);
    }
    #output .menu-num {
      color: var(--bright);
    }
    #output .label {
      color: var(--accent);
    }
    #output .detail {
      color: var(--dim);
    }
    #output .highlight {
      color: var(--bright);
    }
    #output .error {
      color: var(--fg);
      font-style: italic;
    }
    #output .book-cover {
      display: block;
      max-width: 200px;
      margin: 1rem 0 1rem 1rem;
      border: 1px solid var(--fg);
      filter: sepia(0.3) saturate(1.5) brightness(0.85);
    }
    #output .book-link {
      color: var(--bright);
      cursor: pointer;
      text-decoration: none;
    }
    #output .book-link:hover {
      text-decoration: underline;
    }

    /* ─── FOOTER ─────────────────────────────────────── */
    .terminal-footer {
      flex-shrink: 0;
      padding-bottom: 1rem;
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
    }

    .footer-sep {
      color: var(--fg);
      overflow: hidden;
      white-space: nowrap;
    }

    .footer-hint {
      color: var(--fg);
      padding: 0.25rem 0.5rem;
      font-size: 13px;
    }

    /* ─── PROMPT ──────────────────────────────────────── */
    .prompt-line {
      display: flex;
      align-items: center;
      margin-top: 1rem;
      margin-bottom: 0;
    }

    .prompt-prefix {
      color: var(--dim);
      white-space: pre;
      flex-shrink: 0;
    }

    #cmd-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--bright);
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      flex: 1;
      caret-color: var(--bright);
    }

    .cursor-block {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--bright);
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
      margin-left: 1px;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 600px) {
      .terminal { padding: 0.75rem; }
      .logo { font-size: 1.2rem; }
      .logo-sub { font-size: 9px; }
      body { font-size: 12px; }

      .prompt-line {
        margin-top: 0.5rem;
      }

      .prompt-prefix {
        font-size: 11px;
      }

      #cmd-input {
        font-size: 12px;
        min-width: 0;
      }

      .footer-hint {
        font-size: 10px;
      }

      .terminal-footer {
        padding-bottom: 0.5rem;
      }

      .footer-sep {
        font-size: 12px;
      }
    }

    @media (max-width: 380px) {
      .prompt-prefix {
        font-size: 10px;
      }

      #cmd-input {
        font-size: 11px;
      }

      .terminal { padding: 0.5rem; }
    }
  </style>
  <!--
    JSON-LD below is a minimal stub for static crawlers that don't execute JS.
    The full rich version is built dynamically from RESUME_DATA on boot
    (see buildJsonLd() in the script below) and replaces the contents of this tag.
  -->
  <script type="application/ld+json" id="ld-script">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "David Foresi",
    "givenName": "David",
    "familyName": "Foresi"
  }
  </script>
</head>
<body>

<div class="crt-scanline"></div>
<div class="terminal" id="terminal">
  <!-- LOADING -->
  <div id="loader"></div>

  <!-- MAIN CONTENT (hidden until boot) -->
  <div id="main-content" style="display:none">
    <!-- HEADER -->
    <div class="terminal-header">
      <div class="logo" id="ascii-logo">
        <span class="scan-line">DPForesi</span>
      </div>
      <div class="logo-sub">David P. Foresi — Las Vegas, NV / Cabo San Lucas, MX</div>
    </div>

    <!-- TERMINAL OUTPUT (scrollable) -->
    <div id="output"></div>

    <!-- FOOTER (pinned with prompt) -->
    <div class="terminal-footer">
      <div class="footer-sep" id="footer-sep-top"></div>
      <div class="footer-hint" id="footer-hint">enter a number (1-8), command name, or "help" for usage</div>
      <div class="footer-sep" id="footer-sep-bot"></div>
      <form class="prompt-line" id="prompt-line" autocomplete="off">
        <span class="prompt-prefix">guest@dpforesi:~$ </span>
        <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" aria-label="Terminal input" />
        <span class="cursor-block" id="cursor-block"></span>
      </form>
    </div>
  </div><!-- /main-content -->
</div>

<script>
(function () {
  /* ── state ──────────────────────────────────────────── */
  let resumeData = null;
  let currentView = 'main';
  var muted = false;
  const output = document.getElementById('output');
  const input = document.getElementById('cmd-input');

  /* ── background music (starts on first command submit only) ── */
  var bgMusic = new Audio('ambient.m4a');
  bgMusic.loop = true;
  bgMusic.volume = 0.08;
  var bgMusicStarted = false;
  function startBgMusic() {
    if (bgMusicStarted || muted) return;
    bgMusicStarted = true;
    bgMusic.play().catch(function (e) {
      console.warn('Music play failed:', e.message);
      bgMusicStarted = false;
    });
  }
  const cursorBlock = document.getElementById('cursor-block');

  /* ── loading + logo animation ────────────────────────── */
  const loader = document.getElementById('loader');
  const mainContent = document.getElementById('main-content');

  /* ── helpers ────────────────────────────────────────── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function print(html) {
    output.innerHTML += html + '\n';
  }

  function clear() {
    cancelRoll();
    output.innerHTML = '';
  }

  function getSepWidth() {
    var el = document.getElementById('output');
    if (!el) return 64;
    var style = window.getComputedStyle(el);
    var fontSize = parseFloat(style.fontSize) || 14;
    var charW = fontSize * 0.6;
    return Math.max(20, Math.floor(el.clientWidth / charW));
  }

  function makeSep() {
    return '─'.repeat(getSepWidth());
  }

  function printSep() {
    print('<span class="system">' + makeSep() + '</span>');
  }

  /* roll: captures print calls from a screen function,
     then plays them back line-by-line with delay + sound */
  var rollTimers = [];

  function cancelRoll() {
    rollTimers.forEach(function (id) { clearTimeout(id); });
    rollTimers = [];
  }

  function execWithRoll(cmd, fn) {
    cancelRoll();
    /* capture all print calls */
    var buf = [];
    var origPrint = print;
    var origPrintSep = printSep;
    print = function (html) { buf.push(html); };
    printSep = function () { buf.push('<span class="system">' + makeSep() + '</span>'); };
    fn();
    print = origPrint;
    printSep = origPrintSep;
    /* play back with delay */
    rollTimers.push(setTimeout(function () {
      dataRoll();
      buf.forEach(function (line, i) {
        rollTimers.push(setTimeout(function () {
          origPrint(line);
        }, i * 50));
      });
    }, 350));
  }

  /* ── sound effects (Web Audio API) ─────────────────── */
  var audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function beep() {
    if (muted) return;
    var ctx = getAudio();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1000, ctx.currentTime);
    gain.gain.setValueAtTime(0.06, ctx.currentTime);
    gain.gain.setValueAtTime(0.06, ctx.currentTime + 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  }

  function dataRoll() {
    if (muted) return;
    var ctx = getAudio();
    var duration = 1.8;
    var steps = 18;
    for (var i = 0; i < steps; i++) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      var filter = ctx.createBiquadFilter();
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      var t = ctx.currentTime + (i * duration / steps);
      var freq = 80 + Math.random() * 30;
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.9, t + duration / steps);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(300 + i * 40, t);
      filter.Q.setValueAtTime(3, t);
      gain.gain.setValueAtTime(0.012, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration / steps * 0.9);
      osc.start(t);
      osc.stop(t + duration / steps);
    }
  }

  /* ── menu renderer ─────────────────────────────────── */
  function menuItem(selector, label, cmd) {
    return `  <span class="menu-item" data-cmd="${esc(cmd)}"><span class="menu-num">[${selector}]</span>  ${esc(label)}</span>`;
  }

  /* ── screens ────────────────────────────────────────── */
  function showMain() {
    currentView = 'main';
    clear();
    printSep();
    print('<span class="heading">  MAIN MENU</span>');
    printSep();
    print('');
    print(menuItem('A', 'View Resume', 'resume'));
    print(menuItem('B', 'Work History', 'history'));
    print(menuItem('C', 'List Skills', 'skills'));
    print(menuItem('D', 'Experience', 'experience'));
    print(menuItem('E', 'Education', 'education'));
    print(menuItem('F', 'About', 'about'));
    print(menuItem('G', 'Sci-Fi Works', 'books'));
    print(menuItem('H', 'AI Structured Data (JSON-LD)', 'jsonld'));
    print(menuItem('I', 'Raw Resume JSON', 'json'));
    print('');
    print(menuItem('J', muted ? 'Unmute Sound' : 'Mute Sound', 'mute'));
    print(menuItem('K', 'Clear Screen', 'clear'));
    setHint('enter a letter (A-K), command name, or "help" for usage');
  }

  function showResume() {
    currentView = 'resume';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    const d = resumeData;
    printSep();
    print('<span class="heading">  RESUME — ' + esc(d.contact.name) + '</span>');
    printSep();
    print('');
    print('<span class="label">  LOCATIONS</span>');
    d.contact.locations.forEach(l => {
      print('    ' + esc(l.city) + ', ' + esc(l.state) + ', ' + esc(l.country));
    });
    print('');
    print('<span class="label">  SUMMARY</span>');
    wrapText(d.summary, 4).forEach(l => print(l));
    print('');
    print('<span class="label">  CURRENT ROLES</span>');
    d.current_roles.forEach(r => {
      print('    * ' + esc(r));
    });
    print('');
    printSep();
    print('<span class="heading">  EXPERIENCE</span>');
    printSep();
    d.experience.forEach(e => {
      print('');
      print('<span class="highlight">  ' + esc(e.title) + '</span>');
      print('<span class="label">  ' + esc(e.organization) + '</span>  <span class="detail">' + esc(e.dates_display) + '  |  ' + esc(e.location) + '</span>');
      print('');
      wrapText(e.narrative, 4).forEach(l => print(l));
    });
    print('');
    printSep();
    print('<span class="heading">  SKILLS</span>');
    printSep();
    d.skills.forEach(s => {
      print('');
      print('<span class="highlight">  ' + esc(s.heading) + '</span>');
      print('');
      wrapText(s.narrative, 4).forEach(l => print(l));
      print('<span class="detail">    tags: ' + s.tags.map(t => esc(t)).join(', ') + '</span>');
    });
    print('');
    printSep();
    print('<span class="heading">  EDUCATION</span>');
    printSep();
    d.education.forEach(e => {
      print('');
      print('<span class="highlight">  ' + esc(e.degree) + (e.field ? ' — ' + esc(e.field) : '') + '</span>');
      const parts = [e.institution, e.location, e.dates_display].filter(Boolean);
      print('<span class="detail">  ' + parts.map(p => esc(p)).join('  |  ') + '</span>');
      if (e.narrative) wrapText(e.narrative, 4).forEach(l => print(l));
    });
    print('');
    printSep();
    showBackPrompt();
  }

  function showHistory() {
    currentView = 'history';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    printSep();
    print('<span class="heading">  WORK HISTORY</span>');
    printSep();
    print('');
    resumeData.experience.forEach(function (e) {
      print('  <span class="highlight">' + esc(e.dates_display).padEnd(22) + '</span>' + esc(e.title));
      print('  ' + ' '.repeat(22) + '<span class="detail">' + esc(e.organization) + '</span>');
      print('');
    });
    printSep();
    showBackPrompt();
  }

  function showSkills() {
    currentView = 'skills';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    printSep();
    print('<span class="heading">  SKILLS & EXPERTISE</span>');
    printSep();
    resumeData.skills.forEach((s, i) => {
      print('');
      print('<span class="highlight">  [' + (i + 1) + ']  ' + esc(s.heading) + '</span>');
      print('');
      wrapText(s.narrative, 6).forEach(l => print(l));
      print('');
      print('<span class="detail">      tags: ' + s.tags.map(t => esc(t)).join(', ') + '</span>');
    });
    print('');
    printSep();
    showBackPrompt();
  }

  function showExperience() {
    currentView = 'experience';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    printSep();
    print('<span class="heading">  WORK EXPERIENCE</span>');
    printSep();
    resumeData.experience.forEach(e => {
      print('');
      print('<span class="highlight">  ' + esc(e.title) + '</span>');
      print('<span class="label">  ' + esc(e.organization) + '</span>');
      print('<span class="detail">  ' + esc(e.dates_display) + '  |  ' + esc(e.location) + '</span>');
      print('');
      wrapText(e.narrative, 4).forEach(l => print(l));
    });
    print('');
    printSep();
    showBackPrompt();
  }

  function showEducation() {
    currentView = 'education';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    printSep();
    print('<span class="heading">  EDUCATION</span>');
    printSep();
    resumeData.education.forEach(e => {
      print('');
      print('<span class="highlight">  ' + esc(e.degree) + (e.field ? ' — ' + esc(e.field) : '') + '</span>');
      const parts = [e.institution, e.location, e.dates_display].filter(Boolean);
      print('<span class="detail">  ' + parts.map(p => esc(p)).join('  |  ') + '</span>');
      if (e.narrative) {
        wrapText(e.narrative, 4).forEach(l => print(l));
      }
    });
    print('');
    printSep();
    showBackPrompt();
  }

  function showAbout() {
    currentView = 'about';
    clear();
    printSep();
    print('<span class="heading">  ABOUT</span>');
    printSep();
    print('');
    print('  David P. Foresi');
    print('  Las Vegas, NV  /  Cabo San Lucas, MX');
    print('');
    if (resumeData) {
      wrapText(resumeData.summary, 2).forEach(l => print(l));
    }
    print('');
    print('<span class="label">  CURRENT ROLES</span>');
    if (resumeData) {
      resumeData.current_roles.forEach(r => {
        print('    * ' + esc(r));
      });
    }
    print('');
    printSep();
    showBackPrompt();
  }

  function showBooks() {
    currentView = 'books';
    clear();
    printSep();
    print('<span class="heading">  SCI-FI WORKS</span>');
    printSep();
    print('');
    print('<span class="highlight">  The eom Expression: Beautiful Chaos</span>');
    print('<span class="detail">  A Satirical Science Fiction Adventure</span>');
    print('<span class="detail">  1,249 pages  |  Published July 2023  |  Kindle Edition</span>');
    print('');
    print('<img class="book-cover" src="https://m.media-amazon.com/images/P/B0CBW42YZ6.01._SCLZZZZZZZ_SX500_.jpg" alt="The eom Expression book cover" />');
    print('');
    wrapText('A dreamer, freelance shuttle pilot, and staunch advocate of minding his own damn business — Jeron Hayden finds himself drawn to Rieva, a tropical paradise inhabited by anarchists, sentient AI entities, ingenious inventors, and a race of time-agnostic aliens. When a technological singularity threatens total annihilation, Jeron must navigate a quantum-entangled dimension called the echoverse and embrace an esoteric alien philosophy known as eom.', 2).forEach(function (l) { print(l); });
    print('');
    print('  <span class="menu-item" data-cmd="buybook"><span class="menu-num">[A]</span>  View on Amazon</span>');
    print('  <span class="menu-item" data-cmd="d2d"><span class="menu-num">[B]</span>  View on Draft2Digital</span>');
    print('');
    printSep();
    showBackPrompt();
  }

  function showHelp() {
    clear();
    printSep();
    print('<span class="heading">  HELP — AVAILABLE COMMANDS</span>');
    printSep();
    print('');
    print('  <span class="highlight">menu</span>         return to main menu');
    print('  <span class="highlight">resume</span>       full resume view');
    print('  <span class="highlight">history</span>      work history (compact)');
    print('  <span class="highlight">skills</span>       skills & expertise');
    print('  <span class="highlight">experience</span>   detailed work experience');
    print('  <span class="highlight">education</span>    education background');
    print('  <span class="highlight">about</span>        about David Foresi');
    print('  <span class="highlight">books</span>        sci-fi works');
    print('  <span class="highlight">jsonld</span>       structured data (JSON-LD) in new tab');
    print('  <span class="highlight">json</span>         raw resume JSON in new tab');
    print('  <span class="highlight">mute</span>         toggle sound on/off');
    print('  <span class="highlight">clear</span>        clear screen');
    print('  <span class="highlight">help</span>         this help text');

  /* ── text wrap helper ──────────────────────────────── */
  function wrapText(text, indent) {
    const maxWidth = 90;
    const prefix = ' '.repeat(indent);
    const words = text.split(/\s+/);
    const lines = [];
    let line = prefix;
    words.forEach(w => {
      if (line.length + w.length + 1 > maxWidth && line.trim().length > 0) {
        lines.push(esc(line));
        line = prefix + w;
      } else {
        line += (line.trim().length === 0 ? '' : ' ') + w;
      }
    });
    if (line.trim().length > 0) lines.push(esc(line));
    return lines;
  }

  function exec(raw) {
    const normalized = raw.toLowerCase().trim();
    let cmd = normalized;
    if (currentView === 'main' && mainMenuSelectors[normalized]) {
      cmd = mainMenuSelectors[normalized];
    } else if (currentView === 'books' && bookSelectors[normalized]) {
      cmd = bookSelectors[normalized];
    }
    switch (cmd) {
      case 'menu': case 'm': case 'home': case 'main': showMain(); break;
      case 'resume': case 'r': execWithRoll(cmd, showResume); break;
      case 'history': case 'hist': execWithRoll(cmd, showHistory); break;
      case 'skills': case 's': execWithRoll(cmd, showSkills); break;
      case 'experience': case 'exp': case 'e': case 'work': execWithRoll(cmd, showExperience); break;
      case 'education': case 'edu': execWithRoll(cmd, showEducation); break;
      case 'about': case 'a': execWithRoll(cmd, showAbout); break;
      case 'books': case 'book': case 'scifi': case 'sci-fi': execWithRoll(cmd, showBooks); break;
      case 'buybook':
        window.open('https://www.amazon.com/eom-Expression-Beautiful-Satirical-Adventure-ebook/dp/B0CBW42YZ6', '_blank');
        print('<span class="system">  opening Amazon listing in new tab...</span>');
        break;
      case 'd2d':
        window.open('https://books2read.com/u/m26WBo', '_blank');
        print('<span class="system">  opening Draft2Digital listing in new tab...</span>');
        break;
      case 'jsonld': case 'ld': case 'ai':
        var ldScript = document.querySelector('script[type="application/ld+json"]');
        var ldData = ldScript ? ldScript.textContent : '{}';
        var ldBlob = new Blob([ldData], {type: 'application/ld+json'});
        window.open(URL.createObjectURL(ldBlob), '_blank');
        print('<span class="system">  opening JSON-LD structured data in new tab...</span>');
        break;
      case 'json': case 'rawjson':
        var jsonBlob = new Blob([JSON.stringify(resumeData, null, 2)], {type: 'application/json'});
        window.open(URL.createObjectURL(jsonBlob), '_blank');
        print('<span class="system">  opening raw resume JSON in new tab...</span>');
        break;
      case 'mute': case 'unmute':
        muted = !muted;
        if (muted && bgMusicStarted) { bgMusic.pause(); }
        if (!muted && bgMusicStarted) { bgMusic.play().catch(function () {}); }
        print('<span class="system">  sound ' + (muted ? 'muted' : 'unmuted') + '</span>');
        if (currentView === 'main') { showMain(); }
        break;
      case 'clear': case 'cls': case 'c': clear(); break;
      case 'help': case 'h': case '?': showHelp(); break;
      case '': break;
      default:
        print('<span class="error">  unknown command: "' + esc(raw) + '"  — type "help" for available commands</span>');
    }
  }

  /* ── input handling ────────────────────────────────── */
  function submitCommand() {
    const val = input.value.trim();
    if (val) {

      print('<span class="dim">guest@dpforesi:~$ ' + esc(val) + '</span>');

    }
    exec(val);
    input.value = '';
    input.blur();
    /* re-focus after brief delay so mobile keyboard dismisses cleanly */
    setTimeout(function () { input.focus(); }, 50);
  }

  /* form submit handles both desktop Enter and mobile Go/Return */

  /* ── build rich JSON-LD from RESUME_DATA (single source of truth) ── */
  function buildJsonLd(d) {
    var addresses = d.contact.locations.map(function (l) {
      return {
        "@type": "PostalAddress",
        "addressLocality": l.city,
        "addressRegion": l.state,
        "addressCountry": l.country === 'USA' ? 'US' : (l.country === 'Mexico' ? 'MX' : l.country)
      };
    });

    /* unique skill tags across all skill groups */
    var knowsAbout = [];
    var seen = {};
    d.skills.forEach(function (s) {
      s.tags.forEach(function (t) {
        if (!seen[t]) { seen[t] = true; knowsAbout.push(t); }
      });
    });

    /* current experience entries become hasOccupation; all become workHistory */
    var occCategories = {
      'AI Data Annotator & Frontier Model Evaluator': '15-1299.00',
      'Realtor': '41-9022.00',
      'Real Estate Agent': '41-9022.00',
      'Franchise Owner & Travel Advisor': '41-3041.00',
      'Published Author': '27-3043.00',
      'Chief Executive Officer': '11-1011.00',
      'Continuous Improvement Local Change Agent': '13-1199.00',
      'Quality Assurance Coordinator': '43-9061.00',
      'Customer Service Representative': '43-4051.00'
    };

    var hasOccupation = d.experience.filter(function (e) { return e.current; }).map(function (e) {
      var occ = {
        "@type": "Occupation",
        "name": e.title,
        "description": e.narrative
      };
      if (occCategories[e.title]) occ.occupationalCategory = occCategories[e.title];
      return occ;
    });

    /* worksFor: current organizations only */
    var seenOrgs = {};
    var worksFor = [];
    d.experience.filter(function (e) { return e.current; }).forEach(function (e) {
      if (seenOrgs[e.organization]) return;
      seenOrgs[e.organization] = true;
      var org = { "@type": "Organization", "name": e.organization };
      if (e.location && e.location !== 'Remote' && e.location !== 'Virtual') {
        var parts = e.location.split(',').map(function (p) { return p.trim(); });
        org.address = { "@type": "PostalAddress", "addressLocality": parts[0] };
        if (parts[1]) org.address.addressRegion = parts[1];
        if (parts[2]) org.address.addressCountry = parts[2] === 'Mexico' ? 'MX' : parts[2];
      }
      worksFor.push(org);
    });

    /* full work history with all roles */
    var workHistory = d.experience.map(function (e) {
      return {
        "@type": "Role",
        "roleName": e.title,
        "startDate": e.start,
        "endDate": e.current ? undefined : e.end,
        "description": e.narrative,
        "memberOf": { "@type": "Organization", "name": e.organization },
        "location": e.location
      };
    });

    /* skills as detailed DefinedTerm entries with narratives */
    var skillSets = d.skills.map(function (s) {
      return {
        "@type": "DefinedTerm",
        "name": s.heading,
        "description": s.narrative,
        "termCode": s.id,
        "inDefinedTermSet": s.tags
      };
    });

    /* education → alumniOf + hasCredential */
    var alumniOf = d.education.filter(function (e) { return e.institution && e.degree && e.degree.indexOf('Self-Directed') === -1; }).map(function (e) {
      var entry = {
        "@type": "CollegeOrUniversity",
        "name": e.institution
      };
      if (e.location) {
        var parts = e.location.split(',').map(function (p) { return p.trim(); });
        entry.address = { "@type": "PostalAddress", "addressLocality": parts[0] };
        if (parts[1]) entry.address.addressRegion = parts[1];
      }
      return entry;
    });

    var hasCredential = d.education.map(function (e) {
      var cred = {
        "@type": "EducationalOccupationalCredential",
        "name": e.degree + (e.field ? ' — ' + e.field : ''),
        "credentialCategory": e.degree.indexOf('Bachelor') === 0 ? 'degree' : 'self-directed study',
        "description": e.narrative
      };
      if (e.graduated) cred.dateCreated = String(e.graduated);
      else if (e.start) cred.dateCreated = String(e.start);
      return cred;
    });

    /* find published book inside experience entries */
    var book = null;
    d.experience.forEach(function (e) {
      if (e.book) {
        book = {
          "@type": "Book",
          "name": e.book.title,
          "alternateName": e.book.subtitle,
          "bookFormat": "EBook",
          "numberOfPages": e.book.pages,
          "genre": "Science Fiction",
          "datePublished": e.book.published,
          "isbn": e.book.asin,
          "url": e.book.url,
          "author": { "@type": "Person", "name": d.contact.name }
        };
      }
    });

    var ld = {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": d.contact.name,
      "givenName": d.contact.name.split(' ')[0],
      "familyName": d.contact.name.split(' ').slice(-1)[0],
      "description": d.summary,
      "address": addresses,
      "knowsAbout": knowsAbout,
      "hasOccupation": hasOccupation,
      "workHistory": workHistory,
      "knowsLanguage": ["English"],
      "skills": skillSets,
      "worksFor": worksFor,
      "alumniOf": alumniOf,
      "hasCredential": hasCredential
    };

    if (book) {
      ld["@type"] = ["Person", "Author"];
      ld.workExample = book;
    }

    return ld;
  }

  function injectJsonLd() {
    var ld = buildJsonLd(resumeData);
    var script = document.getElementById('ld-script');
    if (script) script.textContent = JSON.stringify(ld, null, 2);
  }

  function boot() {
    resumeData = RESUME_DATA;
    injectJsonLd();
    updateFooterSeps();
    showMain();
  }

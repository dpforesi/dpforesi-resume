<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dpforesi — terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─────────────────────────────────────── */
    :root {
      --bg:      #0e0800;
      --fg:      #f47003;
      --bright:  #f47003;
      --dim:     #f47003;
      --accent:  #f47003;
      --rule:    #f47003;
      --glow:    rgba(244,112,3,0.1);
    }

    /* ─── RESET ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }

    /* ─── CRT SCANLINES ──────────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 1px,
        rgba(0,0,0,0.3) 1px,
        rgba(0,0,0,0.3) 2px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ─── CRT FLICKER + GLOW ─────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(244,112,3,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 998;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0%   { opacity: 0.97; }
      50%  { opacity: 1; }
      100% { opacity: 0.98; }
    }

    /* ─── TERMINAL CONTAINER ─────────────────────────── */
    .terminal {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 100vh;
      display: flex;
      flex-direction: column;
      text-shadow: 0 0 6px rgba(244,112,3,0.6), 0 0 20px rgba(244,112,3,0.25), 0 0 40px rgba(244,112,3,0.1);
    }

    #main-content {
      flex: 1;
      flex-direction: column;
      min-height: 0;
    }

    .terminal-header {
      flex-shrink: 0;
      padding-top: 1.5rem;
    }

    /* ─── LOGO ───────────────────────────────────────── */
    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--bright);
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }

    .logo .scan-line {
      display: block;
      opacity: 0;
      transition: none;
    }

    .logo .scan-line.revealed {
      opacity: 1;
    }

    .logo-sub {
      color: var(--dim);
      font-size: 11px;
      margin-bottom: 1.5rem;
    }

    .separator {
      color: var(--dim);
      margin: 1rem 0;
    }

    /* ─── OUTPUT AREA ────────────────────────────────── */
    #output {
      white-space: pre-wrap;
      word-wrap: break-word;
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }

    #output .system { color: var(--dim); }
    #output .info { color: var(--fg); }
    #output .bright { color: var(--bright); }
    #output .heading {
      color: var(--bright);
      font-weight: bold;
    }
    #output .menu-item {
      color: var(--fg);
      cursor: text;
      display: inline;
    }
    #output .menu-item:hover {
      color: var(--bright);
    }
    #output .menu-num {
      color: var(--bright);
    }
    #output .label {
      color: var(--accent);
    }
    #output .detail {
      color: var(--dim);
    }
    #output .highlight {
      color: var(--bright);
    }
    #output .error {
      color: var(--fg);
      font-style: italic;
    }

    /* ─── FOOTER ─────────────────────────────────────── */
    .terminal-footer {
      flex-shrink: 0;
      padding-bottom: 1rem;
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
    }

    .footer-sep {
      color: var(--fg);
      overflow: hidden;
      white-space: nowrap;
    }

    .footer-hint {
      color: var(--fg);
      padding: 0.25rem 0.5rem;
      font-size: 13px;
    }

    /* ─── PROMPT ──────────────────────────────────────── */
    .prompt-line {
      display: flex;
      align-items: center;
      margin-top: 1rem;
    }

    .prompt-prefix {
      color: var(--dim);
      white-space: pre;
      flex-shrink: 0;
    }

    #cmd-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--bright);
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      flex: 1;
      caret-color: var(--bright);
    }

    .cursor-block {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--bright);
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
      margin-left: 1px;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 600px) {
      .terminal { padding: 0.75rem; }
      .logo { font-size: 1.2rem; }
      .logo-sub { font-size: 9px; }
      body { font-size: 12px; }

      .prompt-line {
        margin-top: 0.5rem;
      }

      .prompt-prefix {
        font-size: 11px;
      }

      #cmd-input {
        font-size: 12px;
        min-width: 0;
      }

      .footer-hint {
        font-size: 10px;
      }

      .terminal-footer {
        padding-bottom: 0.5rem;
      }

      .footer-sep {
        font-size: 12px;
      }
    }

    @media (max-width: 380px) {
      .prompt-prefix {
        font-size: 10px;
      }

      #cmd-input {
        font-size: 11px;
      }

      .terminal { padding: 0.5rem; }
    }
  </style>

<body>

<div class="terminal" id="terminal">
  <!-- LOADING -->
  <div id="loader"></div>

  <!-- MAIN CONTENT (hidden until boot) -->
  <div id="main-content" style="display:none">
    <!-- HEADER -->
    <div class="terminal-header">
      <div class="logo" id="ascii-logo">
        <span class="scan-line">DPForesi</span>
      </div>
      <div class="logo-sub">David P. Foresi — Las Vegas, NV / Cabo San Lucas, MX</div>
    </div>

    <!-- TERMINAL OUTPUT (scrollable) -->
    <div id="output"></div>

    <!-- FOOTER (pinned with prompt) -->
    <div class="terminal-footer">
      <div class="footer-sep" id="footer-sep-top"></div>
      <div class="footer-hint" id="footer-hint">enter a number (1-8), command name, or "help" for usage</div>
      <div class="footer-sep" id="footer-sep-bot"></div>
      <div class="prompt-line" id="prompt-line">
        <span class="prompt-prefix">guest@dpforesi:~$ </span>
        <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" aria-label="Terminal input" />
        <span class="cursor-block" id="cursor-block"></span>
      </div>
    </div>
  </div><!-- /main-content -->
</div>

<script>
(function () {
  /* ── state ──────────────────────────────────────────── */
  let resumeData = null;
  let currentView = 'main';
  const output = document.getElementById('output');
  const input = document.getElementById('cmd-input');

  /* ── background music ──────────────────────────────── */
  var bgMusic = new Audio('ambient.m4a');
  bgMusic.loop = true;
  bgMusic.volume = 0.08;
  var bgMusicStarted = false;
  function startBgMusic() {
    if (bgMusicStarted) return;
    bgMusicStarted = true;
    bgMusic.play().catch(function (e) {
      console.warn('Music play failed:', e.message);
      bgMusicStarted = false;
    });
  }
  document.addEventListener('click', startBgMusic);
  document.addEventListener('keydown', startBgMusic);
  const cursorBlock = document.getElementById('cursor-block');

  /* ── loading + logo animation ────────────────────────── */
  const loader = document.getElementById('loader');
  const mainContent = document.getElementById('main-content');

  /* ── helpers ────────────────────────────────────────── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function print(html) {
    output.innerHTML += html + '\n';
  }

  function clear() {
    cancelRoll();
    output.innerHTML = '';
  }

  function getSepWidth() {
    var el = document.getElementById('output');
    if (!el) return 64;
    var style = window.getComputedStyle(el);
    var fontSize = parseFloat(style.fontSize) || 14;
    var charW = fontSize * 0.6;
    return Math.max(20, Math.floor(el.clientWidth / charW));
  }

  function makeSep() {
    return '─'.repeat(getSepWidth());
  }

  function printSep() {
    print('<span class="system">' + makeSep() + '</span>');
  }

  /* roll: captures print calls from a screen function,
     then plays them back line-by-line with delay + sound */
  var rollTimers = [];

  function cancelRoll() {
    rollTimers.forEach(function (id) { clearTimeout(id); });
    rollTimers = [];
  }

  function execWithRoll(cmd, fn) {
    cancelRoll();
    /* capture all print calls */
    var buf = [];
    var origPrint = print;
    var origPrintSep = printSep;
    print = function (html) { buf.push(html); };
    printSep = function () { buf.push('<span class="system">' + makeSep() + '</span>'); };
    fn();
    print = origPrint;
    printSep = origPrintSep;
    /* play back with delay */
    rollTimers.push(setTimeout(function () {
      dataRoll();
      buf.forEach(function (line, i) {
        rollTimers.push(setTimeout(function () {
          origPrint(line);
        }, i * 50));
      });
    }, 350));
  }

  /* ── sound effects (Web Audio API) ─────────────────── */
  var audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function beep() {
    var ctx = getAudio();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1000, ctx.currentTime);
    gain.gain.setValueAtTime(0.06, ctx.currentTime);
    gain.gain.setValueAtTime(0.06, ctx.currentTime + 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  }

  function dataRoll() {
    var ctx = getAudio();
    var duration = 1.8;
    var steps = 18;
    for (var i = 0; i < steps; i++) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      var filter = ctx.createBiquadFilter();
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      var t = ctx.currentTime + (i * duration / steps);
      var freq = 80 + Math.random() * 30;
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.9, t + duration / steps);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(300 + i * 40, t);
      filter.Q.setValueAtTime(3, t);
      gain.gain.setValueAtTime(0.012, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration / steps * 0.9);
      osc.start(t);
      osc.stop(t + duration / steps);
    }
  }

  /* ── menu renderer ─────────────────────────────────── */
  function menuItem(num, label, cmd) {
    return `  <span class="menu-item" data-cmd="${esc(cmd)}"><span class="menu-num">[${num}]</span>  ${esc(label)}</span>`;
  }

  /* ── screens ────────────────────────────────────────── */
  function showMain() {
    currentView = 'main';
    clear();
    printSep();
    print('<span class="heading">  MAIN MENU</span>');
    printSep();
    print('');
    print(menuItem('1', 'View Resume', 'resume'));
    print(menuItem('2', 'Work History', 'history'));
    print(menuItem('3', 'List Skills', 'skills'));
    print(menuItem('4', 'Experience', 'experience'));
    print(menuItem('5', 'Education', 'education'));
    print(menuItem('6', 'About', 'about'));
    print(menuItem('7', 'AI Structured Data (JSON-LD)', 'jsonld'));
    print(menuItem('8', 'Raw JSON', 'json'));
    print('');
    print(menuItem('0', 'Clear Screen', 'clear'));
    setHint('enter a number (1-8), command name, or "help" for usage');
  }

  function showResume() {
    currentView = 'resume';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    const d = resumeData;
    printSep();
    print('<span class="heading">  RESUME — ' + esc(d.contact.name) + '</span>');
    printSep();
    print('');
    print('<span class="label">  LOCATIONS</span>');
    d.contact.locations.forEach(l => {
      print('    ' + esc(l.city) + ', ' + esc(l.state) + ', ' + esc(l.country));
    });
    print('');
    print('<span class="label">  SUMMARY</span>');
    wrapText(d.summary, 4).forEach(l => print(l));
    print('');
    print('<span class="label">  CURRENT ROLES</span>');
    d.current_roles.forEach(r => {
      print('    * ' + esc(r));
    });
    print('');
    printSep();
    print('<span class="heading">  EXPERIENCE</span>');
    printSep();
    d.experience.forEach(e => {
      print('');
      print('<span class="highlight">  ' + esc(e.title) + '</span>');
      print('<span class="label">  ' + esc(e.organization) + '</span>  <span class="detail">' + esc(e.dates_display) + '  |  ' + esc(e.location) + '</span>');
      print('');
      wrapText(e.narrative, 4).forEach(l => print(l));
    });
    print('');
    printSep();
    print('<span class="heading">  SKILLS</span>');
    printSep();
    d.skills.forEach(s => {
      print('');
      print('<span class="highlight">  ' + esc(s.heading) + '</span>');
      print('');
      wrapText(s.narrative, 4).forEach(l => print(l));
      print('<span class="detail">    tags: ' + s.tags.map(t => esc(t)).join(', ') + '</span>');
    });
    print('');
    printSep();
    print('<span class="heading">  EDUCATION</span>');
    printSep();
    d.education.forEach(e => {
      print('');
      print('<span class="highlight">  ' + esc(e.degree) + (e.field ? ' — ' + esc(e.field) : '') + '</span>');
      const parts = [e.institution, e.location, e.dates_display].filter(Boolean);
      print('<span class="detail">  ' + parts.map(p => esc(p)).join('  |  ') + '</span>');
      if (e.narrative) wrapText(e.narrative, 4).forEach(l => print(l));
    });
    print('');
    printSep();
    showBackPrompt();
  }

  function showHistory() {
    currentView = 'history';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    printSep();
    print('<span class="heading">  WORK HISTORY</span>');
    printSep();
    print('');
    resumeData.experience.forEach(function (e) {
      print('  <span class="highlight">' + esc(e.dates_display).padEnd(22) + '</span>' + esc(e.title));
      print('  ' + ' '.repeat(22) + '<span class="detail">' + esc(e.organization) + '</span>');
      print('');
    });
    printSep();
    showBackPrompt();
  }

  function showSkills() {
    currentView = 'skills';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    printSep();
    print('<span class="heading">  SKILLS & EXPERTISE</span>');
    printSep();
    resumeData.skills.forEach((s, i) => {
      print('');
      print('<span class="highlight">  [' + (i + 1) + ']  ' + esc(s.heading) + '</span>');
      print('');
      wrapText(s.narrative, 6).forEach(l => print(l));
      print('');
      print('<span class="detail">      tags: ' + s.tags.map(t => esc(t)).join(', ') + '</span>');
    });
    print('');
    printSep();
    showBackPrompt();
  }

  function showExperience() {
    currentView = 'experience';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    printSep();
    print('<span class="heading">  WORK EXPERIENCE</span>');
    printSep();
    resumeData.experience.forEach(e => {
      print('');
      print('<span class="highlight">  ' + esc(e.title) + '</span>');
      print('<span class="label">  ' + esc(e.organization) + '</span>');
      print('<span class="detail">  ' + esc(e.dates_display) + '  |  ' + esc(e.location) + '</span>');
      print('');
      wrapText(e.narrative, 4).forEach(l => print(l));
    });
    print('');
    printSep();
    showBackPrompt();
  }

  function showEducation() {
    currentView = 'education';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    printSep();
    print('<span class="heading">  EDUCATION</span>');
    printSep();
    resumeData.education.forEach(e => {
      print('');
      print('<span class="highlight">  ' + esc(e.degree) + (e.field ? ' — ' + esc(e.field) : '') + '</span>');
      const parts = [e.institution, e.location, e.dates_display].filter(Boolean);
      print('<span class="detail">  ' + parts.map(p => esc(p)).join('  |  ') + '</span>');
      if (e.narrative) {
        wrapText(e.narrative, 4).forEach(l => print(l));
      }
    });
    print('');
    printSep();
    showBackPrompt();
  }

  function showAbout() {
    currentView = 'about';
    clear();
    printSep();
    print('<span class="heading">  ABOUT</span>');
    printSep();
    print('');
    print('  David P. Foresi');
    print('  Las Vegas, NV  /  Cabo San Lucas, MX');
    print('');
    if (resumeData) {
      wrapText(resumeData.summary, 2).forEach(l => print(l));
    }
    print('');
    print('<span class="label">  CURRENT ROLES</span>');
    if (resumeData) {
      resumeData.current_roles.forEach(r => {
        print('    * ' + esc(r));
      });
    }
    print('');
    printSep();
    showBackPrompt();
  }

  function showJSON() {
    currentView = 'json';
    clear();
    if (!resumeData) { print('<span class="error">error: resume data not loaded.</span>'); return; }
    printSep();
    print('<span class="heading">  RESUME DATA (JSON)</span>');
    printSep();
    print('');
    const json = JSON.stringify(resumeData, null, 2);
    print('<span class="detail">' + esc(json) + '</span>');
    print('');
    printSep();
    showBackPrompt();
  }

  function showHelp() {
    clear();
    printSep();
    print('<span class="heading">  HELP — AVAILABLE COMMANDS</span>');
    printSep();
    print('');
    print('  <span class="highlight">menu</span>         return to main menu');
    print('  <span class="highlight">resume</span>       full resume view');
    print('  <span class="highlight">history</span>      work history (compact)');
    print('  <span class="highlight">skills</span>       skills & expertise');
    print('  <span class="highlight">experience</span>   detailed work experience');
    print('  <span class="highlight">education</span>    education background');
    print('  <span class="highlight">about</span>        about David Foresi');
    print('  <span class="highlight">jsonld</span>       structured data (JSON-LD) in new tab');
    print('  <span class="highlight">json</span>         raw resume JSON in new tab');
    print('  <span class="highlight">clear</span>        clear screen');
    print('  <span class="highlight">help</span>         this help text');
    print('');
    print('  <span class="detail">you can also enter menu numbers (1-8) or click menu items.</span>');
    print('');
    printSep();
    showBackPrompt();
  }

  function showBackPrompt() {
    setHint('type "menu" or "m" to return  |  "help" for commands');
  }

  function setHint(text) {
    var el = document.getElementById('footer-hint');
    if (el) el.textContent = text;
  }

  /* ── text wrap helper ──────────────────────────────── */
  function wrapText(text, indent) {
    const maxWidth = 90;
    const prefix = ' '.repeat(indent);
    const words = text.split(/\s+/);
    const lines = [];
    let line = prefix;
    words.forEach(w => {
      if (line.length + w.length + 1 > maxWidth && line.trim().length > 0) {
        lines.push(esc(line));
        line = prefix + w;
      } else {
        line += (line.trim().length === 0 ? '' : ' ') + w;
      }
    });
    if (line.trim().length > 0) lines.push(esc(line));
    return lines;
  }

  const commands = {
    '1': 'resume', '2': 'history', '3': 'skills', '4': 'experience',
    '5': 'education', '6': 'about', '7': 'jsonld', '8': 'json', '0': 'clear'
  };

  function exec(raw) {
    const cmd = (commands[raw] || raw).toLowerCase().trim();
    switch (cmd) {
      case 'menu': case 'm': case 'home': case 'main': showMain(); break;
      case 'resume': case 'r': execWithRoll(cmd, showResume); break;
      case 'history': case 'hist': execWithRoll(cmd, showHistory); break;
      case 'skills': case 's': execWithRoll(cmd, showSkills); break;
      case 'experience': case 'exp': case 'e': case 'work': execWithRoll(cmd, showExperience); break;
      case 'education': case 'edu': execWithRoll(cmd, showEducation); break;
      case 'about': case 'a': execWithRoll(cmd, showAbout); break;
      case 'jsonld': case 'ld': case 'ai':
        var ldScript = document.querySelector('script[type="application/ld+json"]');
        var ldData = ldScript ? ldScript.textContent : '{}';
        var ldBlob = new Blob([ldData], {type: 'application/ld+json'});
        window.open(URL.createObjectURL(ldBlob), '_blank');
        print('<span class="system">  opening JSON-LD structured data in new tab...</span>');
        break;
      case 'json': case 'j':
        var jsonBlob = new Blob([JSON.stringify(resumeData, null, 2)], {type: 'application/json'});
        window.open(URL.createObjectURL(jsonBlob), '_blank');
        print('<span class="system">  opening raw JSON in new tab...</span>');
        break;
      case 'clear': case 'cls': case 'c': clear(); break;
      case 'help': case 'h': case '?': showHelp(); break;
      case '': break;
      default:
        print('<span class="error">  unknown command: "' + esc(raw) + '"  — type "help" for available commands</span>');
    }
  }

      exec(val);

    }
  });

  });
